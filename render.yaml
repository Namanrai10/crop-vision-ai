services:
  - type: web
    name: crop-vision-ai-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        value: mongodb+srv://<username>:<password>@<cluster>/<dbname>?retryWrites=true&w=majority
      - key: DB_NAME
        value: cropvision
      - key: JWT_SECRET
        value: change-me
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_MINUTES
        value: 60
      - key: REFRESH_TOKEN_DAYS
        value: 30
      - key: CORS_ORIGINS
        value: https://crop-vision-ai.vercel.app
